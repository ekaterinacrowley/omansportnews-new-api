          schema:
            type: integer
            format: int64
          description: |
            Дата начала выборки в Unix Epoch.
        - name: dateTo
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: |
            Дата окончания выборки в Unix Epoch.
        - name: ref
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 1
          description: |
            Идентификатор партнера (параметр необходимо уточнять у менеджера).
        - name: lng
          in: query
          description: |
            Двухбуквенный код языка в ISO 639-1.

            См.
            [Справочник языков](/api#tag/Marketing/operation/LanguagesQuery).

            По умолчанию: en
          schema:
            type: string
