    GameShortResponse:
      type: object
      properties:
        id:
          type: string
          description: Идентификатор игры.
          nullable: true
        stageId:
          type: string
          description: Идентификатор этапа.
          nullable: true
        team1:
          type: string
          description: Идентификатор первого оппонента.
          nullable: true
        team2:
          type: string
          description: Идентификатор второго оппонента.
          nullable: true
        dateStart:
          type: integer
          description: Дата старта игры.
          format: int64
        score1:
          type: integer
          description: Очки первого оппонента.
          format: int32
          nullable: true
        score2:
          type: integer
          description: Очки второго оппонента.
          format: int32
          nullable: true
        subScore1:
          type: integer
          description: Дополнительные очки первого оппонента.
          format: int32
          nullable: true
        subScore2:
          type: integer
          description: Дополнительные очки второго оппонента.
          format: int32
          nullable: true
        stringScore1:
          type: string
          description: 'Счет первого оппонента (string), для крикета, например: 156/9.'
          nullable: true
        stringScore2:
          type: string
          description: 'Счет второго оппонента (string), для крикета, например: 156/9.'
          nullable: true
        winner:
          type: integer
          description: |
            Победитель.
            
            * `0` — ничья
            * `1` — победил первый оппонент
            * `2` — победил второй оппонент.
            
            Если игра в Live, значение указывает на соперника, который в данный момент лидирует.
          format: int32
          nullable: true
        status:
          type: integer
          description:  |
            Статус игры. 
            
            * `1` — будущая игра
            * `2` — игра в лайве
            * `3` — игра завершена.
          format: int32
        subStatus:
          type: integer
          description: '[Дополнительный статус](/intro/references/gameSubStatuses).'
          format: int32
        periods:
          type: array
          items:
            $ref: '#/components/schemas/PeriodShortResponse'
          description: Периоды
          nullable: true
        gameId:
          type: integer
          description: Идентификатор игры
          format: int32
          nullable: true
        constId:
          type: integer
          description: |
            Сквозной идентификатор для игр Line и Live.
          format: int32
          nullable: true
        tournamentTitle:
          type: string
          description: Турнир, в котором проходила игра.
          nullable: true
        description:
          type: string
          description: Описание.
          nullable: true
      additionalProperties: false
    GameStatisticResponse:
      type: object
      properties:
        title:
          type: string
          description: 'Заголовок периода.'
          nullable: true
        periodStatistic:
          type: array
          items:
            $ref: '#/components/schemas/PeriodStatisticResponse'
          description: 'Список статистики за период.'
          nullable: true
      additionalProperties: false
      description: 'Статистика игры.'
    GameTopPlayerResponse:
      type: object
