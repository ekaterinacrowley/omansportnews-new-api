          required: true
          schema:
            type: integer
            format: int32
            default: 1
        - name: gr
          in: query
          description: |
            Группа. Совместно с `cnt`:
            
            * определяет доступность видео на сайте букмекера;
            * используется для формирования доменной части ссылки (`link` в ответе).
            
