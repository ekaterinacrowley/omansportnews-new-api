            Формат: `{относительный путь ссылки, включая домен}?tag={тег}`

            Пример: *ref.top/L?tag=s_23283m_355c_*

            Если передано значение, все ссылки (`link` в ответе) будут заменены:
            * `https://{переданное значение}&r={путь ссылки на спортивное событие на сайте букмекера}`
            * `https://ref.top/L?tag=s_23283m_355c&r=/ru/live/Football/1299397-England-Premier-League-2/351754042-Crystal-Palace-U23-Liverpool-U23`

            > Обратитесь в вашему менеджеру, чтобы узнать как получить
            партнерскую ссылку в Личном кабинете партнера.
          schema:
            type: string
            nullable: true
        - name: opponentIds
          in: query
          description: |
            Идентификаторы оппонентов через запятую.

            Если переданы, в ответе будут только события с указанными
            оппонентами.
          schema:
            type: string
            nullable: true
        - name: count
          in: query
          description: |
            Максимальное количество спортивных событий, которое будет возвращено
            в ответе.

            По умолчанию `100`.

            > Если задано значение `count`, то сервис сначала берет `count`
            событий, а затем фильтрует их по флагу `hasVideo`. В результате
            событий в ответе может быть меньше, чем `count`.
          schema:
            type: integer
            format: int32
            default: 100
      responses:
        '200':
          description: |
            Массив спортивных событий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDataFeed.Contract.ListResultResource`1[GameDataFeed.Live.Contract.V2.LocalizationSportEventDtoV2]'
        '400':
          description: |
            Ошибка валидации:
            * не передан обязательный параметр
            * неизвестный параметр. *Проверьте имя параметра*
            * два одинаковых параметра в запросе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: |
            Ошибка проверки правил.

            *Проверьте, правильно ли указаны `ref` и `gr` в запросе*
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
      summary: Спортивные события лайва
  /datafeed/prematch/api/v1/gameInsights:
    get:
      tags:
      - LoadSingle
      description: Возвращает маркеты и инсайты по `sportEventId`.
      operationId: GameInsights
      parameters:
      - name: sportEventId
        in: query
        description: |
          Идентификатор спортивного события.
        required: true
        schema:
          type: integer
          format: int32
      - name: ref
        in: query
        description: Идентификатор партнера (параметр необходимо уточнять у менеджера).
        required: true
        schema:
          type: integer
          format: int32
          default: 1
      - name: gr
        in: query
        description: |
          Группа.
          
          Совместно с `cnt` определяет доступность видео на сайте букмекера.
          
          Уточните значение параметра у вашего менеджера.
        schema:
          type: integer
          format: int32
          nullable: true
      - name: cnt
        in: query
        description: |
          Страна-геопозиция клиента.
          
          Позволяет определять наличие видео в лайве для конкретной страны.
          
          Флаг `hasVideo` в ответе будет только у тех спортивных событий, для
          которых на сайте букмекера ожидается видео в стране, указанной в
          запросе.
        schema:
          type: integer
          format: int32
          nullable: true
      - name: lng
        in: query
        description: |
          Двухбуквенный код языка в ISO 639-1.
          
          См.
          [Справочник языков](/api#tag/Marketing/operation/LanguagesQuery).
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: Массив инсайтов.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GameDataFeed.Contract.ListResultResource`1[GameDataFeed.Line.Contract.V1.SportEventInsightsDto]"
        '400':
          description: |
            Ошибка валидации:
            * не передан обязательный параметр
            * неизвестный параметр. *Проверьте имя параметра*
            * два одинаковых параметра в запросе
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails"
        '403':
          description: |
            Ошибка проверки правил.

            *Проверьте, правильно ли указаны `ref` и `gr` в запросе*.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails"
