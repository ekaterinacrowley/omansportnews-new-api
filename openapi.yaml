  /result/api/v1/sportevents:
    get:
      tags:
        - Result
      summary: Результаты спортивных событий по турнирам
      description: |
        Запрос результатов спортивных событий по `tournamentId`.

        Возвращает спортивные события турнира с их результатами — счетом матча.

        Если матч не состоялся, в ответе будет информация об отмене.
      operationId: GetGames
      parameters:
        - name: dateFrom
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: |
            Дата начала выборки в Unix Epoch.
        - name: dateTo
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: |
            Дата окончания выборки в Unix Epoch.
        - name: tournamentIds
          in: query
          required: true
          schema:
            type: string
          description: |
            Идентификаторы турниров.
        - name: ref
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 1
          description: |
            Идентификатор партнера (параметр необходимо уточнять у менеджера).
        - name: vids
          in: query
          schema:
            type: string
            default: ''
          description: |
            Идентификаторы видов спортивных событий. По умолчанию — все виды.

            > Некоторые виды спорта (
            `3` (Баскетбол),
            `28` (Австралийский футбол),
            `13` (Американский футбол))
            могут содержать главные спортивные события с `Vids` = `12`
            (см. [Глоссарий](/intro/glossary)).

            > События, которые не являются главными (с основным типом
            (`Types` = `1`) и основным периодом (`Periods` = `0`)), будут
            приходить с основным видом (`Vids` = `1`).
        - name: types
          in: query
          schema:
            type: string
            default: ''
          description: |
            Идентификаторы типов спортивных событий.

            По умолчанию — все типы.
        - name: lng
          in: query
          description: |
