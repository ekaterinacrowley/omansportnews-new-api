          in: query
          description: |
            Включать ли дисциплины киберспорта:

            * `0` (по умолчанию) — все спорты кроме Киберспорта. В ответе будут
              все спорты, для которых есть завершенные матчи, кроме Киберспорта
            * `1` — только Киберспорт. Если передан, и доступны результаты
