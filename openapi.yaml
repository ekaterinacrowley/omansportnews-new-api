components:
  securitySchemes:
    clientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          scopes: {}
          tokenUrl: https://cpservm.com/gateway/token
      description: |
        1.  Запросите у вашего менеджера идентификатор клиента `client_id` и
            секрет клиента `client_secret`.

            > Важно: `client_secret` должен быть известен только
            приложению-клиенту и API.

        1.  Выполните POST-запрос (описан ниже).
        1.  В ответе придет JWT-токен `access_token`.
        1.  Скопируйте его и добавляйте в заголовок каждого GET-запроса:
           "Authorization: Bearer `access_token`".

        Время жизни токена ограничено и приходит в ответе: `expires_in` в
        секундах. Когда время жизни токена истечет, нужно перезапросить его.


        ### Запрос

        ```sh
        curl \
          -L \
          -X POST \
          https://cpservm.com/gateway/token \
          -H 'Content-Type: application/x-www-form-urlencoded'
          -d 'client_id=test' \
          -d 'client_secret=fDIRK7NDWoRY61MPYoviXrF$J7b7GKHmfd@#v0znvkPtUl9O'
        ```

        ### Ответ

        ```json
        {
          "access_token": "auth_token",
          "expires_in": 3600
        }
        ```

        > См. также
        [RFC 6749](https://datatracker.ietf.org/doc/html/rfc6749#section-4.4),
        раздел "Client Credetials", чтобы узнать как получать доступ к ресурсам
        посредством OAuth 2.0.
