openapi: 3.1.1
info:
  version: '1.14'
  title: Marketing API
  description: |
    API позволяет получать спортивные события, маркеты для них и результат матча
    — его счет, а также — реферальные ссылки, чтобы перенаправлять трафик из
    вашего приложения на сайт букмекера для участия в реферальной программе.

    **Формат возвращаемых данных**: JSON

    > **Важно**: один матч в реальном мире в API соответствует разным спортивным
    > событиям:
    > *   для линии и для лайва
    > *   для разных периодов матча
    > *   для дополнительных маркетов не на исход матча (типы спортивных
    >     событий)

    *   [Глоссарий](/intro/glossary)
    *   Как получить все спортивные события матча:
        *   [LoadSingle](/intro/getEvents/loadsingle)
        *   [LoadList](/intro/getEvents/loadlist)
        *   [LoadTree](/intro/getEvents/loadtree)
    *   Как получить результаты спортивных событий:
        *   [Result](/intro/result)
    *   Как получить статистику:
        *   [Statistics](/intro/MarketingStatisticFeed)
servers:
  - url: https://cpservm.com/gateway/marketing
security:
  - clientCredentials: []
tags:
  - name: LoadSingle
    description: |
      Спортивные события `LoadSingle`

      > Если какой-либо из методов возвращает 403 ошибку, запросите у вашего
      менеджера доступ к `LoadSingle`.
  - name: LoadList
    description: |
      Спортивные события `LoadList`

      > Если какой-либо из методов возвращает 403 ошибку, запросите у вашего
      менеджера доступ к `LoadList`.
  - name: LoadTree
    description: |
      Спортивные события `LoadTree`

      > Если какой-либо из методов возвращает 403 ошибку, запросите у вашего
      менеджера доступ к `LoadTree`.
  - name: Result
    description: |
      Результаты матчей.

      Для всех методов действуют ограничения:
      * **Минимальная** разница между `dateFrom` и `dateTo` составляет 1 минуту.
      * **Максимальная между** `dateFrom` и `dateTo` составляет 48 часов.
  - name: Marketing
    x-displayName: Dictionaries
    description: |
      Справочники
  - name: Models
    x-displayName: Models

    description: |
      См. [Глоссарий](/intro/glossary), чтобы узнать больше о терминах, которые
      используются в описании ниже.


      ## Спортивное событие линии

      <SchemaDefinition
        schemaRef="#/components/schemas/GameDataFeed.Line.Contract.V2.LocalizationSportEventDtoV2"
      />


      ## Спортивное событие лайва

      <SchemaDefinition
        schemaRef="#/components/schemas/GameDataFeed.Live.Contract.V2.LocalizationSportEventDtoV2"
      />


      ## Маркет

      <SchemaDefinition
        schemaRef="#/components/schemas/GameDataFeed.Contract.V2.OddDtoV2"
      />
      
      ## Таблица чемпионата

      <SchemaDefinition
        schemaRef="#/components/schemas/TableBaseResponse"
      />
  - name: Statistics
    description: Статистика
paths:
  /datafeed/prematch/api/v2/sportevents:
    get:
      tags:
        - LoadSingle
      description: |
        **Ограничение количества запросов**: Не более 1 идентичного* запроса 1
        раз в 20 секунд с 1 клиентского приложения. Это необходимо, чтобы
        равномерно распределить ресурсы сервиса API и защитить его от
        перегрузки.

        <details>
          <summary>
            *Идентичный запрос — это запрос с тем же набором и значениями
            параметров.
          </summary>

         <div>
            Запросы ниже идентичные:

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'Periods=1,2,3' \
              -d 'SportIds=1,2,3'
            ```

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'Periods=1,2,3' \
              -d 'SportIds=1,2,3'
            ```

            Запросы ниже не идентичные:

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'SportEventIds=12345'
            ```

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'SportEventIds=54321'
            ```
          </div>
        </details>
      operationId: SportEventsOperationLine
      parameters:
        - name: ref
          in: query
          description: |
            Идентификатор партнера (параметр необходимо уточнять у менеджера).
          required: true
          schema:
            type: integer
            format: int32
            default: 1
        - name: gr
          in: query
          description: |
            Группа. Совместно с `cnt`:
            
            * определяет доступность видео на сайте букмекера;
            * если не передан `partnerLink`, используется для формирования доменной части ссылки (`link` в ответе).
            
            Уточните значение параметра у вашего менеджера.
          schema:
            type: integer
            format: int32
            nullable: true
        - name: cnt
          in: query
          description: |
            Страна-геопозиция клиента.
            
            Позволяет определять наличие видео в лайве для конкретной страны. 
            Флаг `hasVideo` в ответе будет только у тех спортивных событий, для которых на сайте букмекера ожидается видео в стране, указанной в запросе.
            
            Если не передан `partnerLink`, используется совместно с `gr` для формирования доменной части ссылки (`link` в ответе). 
          schema:
            type: integer
            format: int32
            nullable: true
        - name: lng
          in: query
          description: |
            Двухбуквенный код языка в ISO 639-1.

            См.
            [Справочник языков](/api#tag/Marketing/operation/LanguagesQuery).
          schema:
            type: string
            nullable: true
        - name: periods
          in: query
          description: |
            Номера периодов спортивных событий через запятую.

            По умолчанию всегда `0` (основной период).

            > Чтобы получить все возможные периоды, укажите `0`, `1`, `2`, ...
            (количество периодов зависит от спорта).
          schema:
            type: string
            nullable: true
        - name: vids
          in: query
          description: |
            Идентификаторы видов спортивных событий через запятую.

            По умолчанию `1` (основной вид).

            > Некоторые виды спорта
            (`3` (Баскетбол),
            `28` (Австралийский футбол),
            `13` (Американский футбол))
            могут содержать главные спортивные события с `Vids` = `12`
            (см. [Глоссарий](/intro/glossary)).

            Дополнительно передавайте `Vids` = `12`, чтобы получить их.

            > События, которые не являются главными (с основным типом
            (`Types` = `1`) и основным периодом (`Periods` = 0)),
            будут приходить с основным видом (`Vids` = 1).
          schema:
            type: string
            nullable: true
        - name: types
          in: query
          description: |
            Идентификаторы типов спортивных событий через запятую.

            По умолчанию `1` (основной тип).
          schema:
            type: string
            nullable: true
        - name: sportEventIds
          in: query
          description: |
            Идентификаторы спортивных событий через запятую.

            > **Важно**: может принимать как `sportEventId`, так и
            `constSportEventId` (общий идентификатор события для линии и лайва).
            Чтобы найти матч из линии в лайве после его начала, используйте
            `constSportEventId`.
          schema:
            type: string
            nullable: true
        - name: tournamentIds
          in: query
          description: |
            Идентификаторы турниров через запятую.

            По умолчанию — все турниры.
          schema:
            type: string
            nullable: true
        - name: tournamentCountryIds
          in: query
          description: |
            Идентификаторы стран проведения турниров через запятую.

            Принимает `id` из
            [Справочника стран](/api#tag/Marketing/operation/LocalizedCountryNamesQuery).
          schema:
            type: string
            nullable: true
        - name: sportIds
          in: query
          description: |
            Идентификаторы спортов через запятую.

            По умолчанию — все спорты из справочника.
          schema:
            type: string
            nullable: true
        - name: subSportIds
          in: query
          description: |
            Идентификаторы дисциплин через запятую.
          schema:
            type: string
            nullable: true
        - name: gtStart
          in: query
          description: |
            Фильтр по времени старта: в ответе придут спортивные события,
            дата старта которых больше указанного значения.

            Задается как UnixEpoch.
          schema:
            type: integer
            format: int64
            nullable: true
        - name: ltStart
          in: query
          description: |
            Фильтр по времени старта: в ответе придут спортивные события, дата
            старта которых меньше указанного значения.

            Задается как UnixEpoch.
          schema:
            type: integer
            format: int64
            nullable: true
        - name: oddsIds
          in: query
          description: |
            Идентификаторы маркетов (из справочника) через запятую.

            Потребуется, чтобы получить конкретные маркеты по спортивному
            событию.
          schema:
            type: string
            nullable: true
        - name: schemeOfGettingOddsOperations
          in: query
          description: |
            > [Фильтр возвращаемых маркетов](/intro/references/schemeOfGettingOdds#schemeofgettingoddsoperations).
          schema:
            $ref: '#/components/schemas/GameDataFeed.Contract.SchemeOfGettingOddsOperations'
        - name: video
          in: query
          description: |
            Фильтр по наличию будущей видеотрансляции после начала события (в
            лайве).

            * `true` — в ответе придут только спортивные события с видео
              (`hasVideo` = `true`)
            * `false` (по умолчанию) — придут все спортивные события (и с видео,
              и без)

            > См. также `count`.
          schema:
            type: boolean
        - name: partnerLink
          in: query
          description: |
            Партнерская ссылка для замены ссылки на спортивное событие в ответе.

            Формат: `{относительный путь ссылки, включая домен}?tag={тег}`

            Пример: *ref.top/L?tag=s_23283m_355c_*

            Если передано значение, все ссылки (`link` в ответе) будут заменены:
            * `https://{переданное значение}&r={путь ссылки на спортивное событие на сайте букмекера}`
            * `https://ref.top/L?tag=s_23283m_355c&r=/ru/live/Football/1299397-England-Premier-League-2/351754042-Crystal-Palace-U23-Liverpool-U23`

            > Обратитесь в вашему менеджеру, чтобы узнать как получить
            партнерскую ссылку в Личном кабинете партнера.
          schema:
            type: string
            nullable: true
        - name: opponentIds
          in: query
          description: |
            Идентификаторы оппонентов через запятую.

            Если переданы, в ответе будут только события с указанными
            оппонентами.
          schema:
            type: string
            nullable: true
        - name: count
          in: query
          description: |
            Максимальное количество спортивных событий, которое будет возвращено
            в ответе.

            По умолчанию `100`.

            > Если задано значение `count`, то сервис сначала берет `count`
            событий, а затем фильтрует их по флагу `hasVideo`. В результате
            событий в ответе может быть меньше, чем `count`.
          schema:
            type: integer
            format: int32
            default: 100
      responses:
        '200':
          description: |
            Массив спортивных событий.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDataFeed.Contract.ListResultResource`1[GameDataFeed.Line.Contract.V2.LocalizationSportEventDtoV2]'
        '400':
          description: |
            Ошибка валидации:
            * не передан обязательный параметр
            * неизвестный параметр. *Проверьте имя параметра*
            * два одинаковых параметра в запросе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: |-
            Ошибка проверки правил.

            *Проверьте, правильно ли указаны `ref` и `gr` в запросе*.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
      summary: Спортивные события линии
  /datafeed/live/api/v2/sportevents:
