    GameDataFeed.Line.Contract.V1.GameDetailsLoadList:
      type: object
      properties:
        sportEventId:
          type: integer
          description: |-
            Идентификатор спортивного события.

            > Один матч может содержать несколько событий с разными
            `sportEventId`, разными `period` и/или `type`, но одинаковым
            `mainConstSportEventId`.

            См.
            [Получение всех спортивных событий матча](/intro/getEvents/loadlist).
          format: int64
        mainConstSportEventId:
          type: integer
          description: |
            Общий идентификатор: все события (с разными `sportEventId`) внутри
            одного матча будут использовать один `mainConstSportEventId`.
          format: int64
        constSportEventId:
          type: integer
          description: |
            Общий идентификатор спортивного события для линии и лайва.

            > **Важно**: Один и тот же матч будет иметь разные `sportEventId` в
            линии и лайве. Чтобы найти матч из линии в лайве после его начала,
            используйте `constSportEventId`.
          format: int64
        tournamentId:
          type: integer
          description: |
            Уникальный идентификатор турнира.
          format: int64
        sportId:
          type: integer
          description: |
            Уникальный идентификатор спорта.
          format: int64
        subSportId:
          type: integer
          description: |
            Идентификатор дисциплины.

            > Актуален для спорта Киберспорт, для остальных будет приходить `0`.
          format: int64
        tournamentNameLocalizations:
          type: object
          additionalProperties:
            type: string
          description: |
            Локализованные имена турнира для `languages`, переданных в запросе.
          nullable: true
        opponent1NameLocalizations:
          type: object
          additionalProperties:
            type: string
          description: |
            Локализованное имя первого оппонента.
          nullable: true
        opponent2NameLocalizations:
          type: object
          additionalProperties:
            type: string
          description: |
            Локализованное имя второго оппонента.
          nullable: true
        imageOpponent1:
          type: array
          items:
            type: string
          description: |
            Массив изображений первого оппонента для скачивания.

            Для парных видов спорта будет приходить два элемента.
          nullable: true
        imageOpponent2:
          type: array
          items:
            type: string
          description: |
            Массив изображений второго оппонента для скачивания.

            Для парных видов спорта будет приходить два элемента.
          nullable: true
        tournamentImage:
          type: array
          items:
            type: string
          description: |
            Изображение турнира для скачивания.
          nullable: true
        type:
          type: integer
          description: |
            Тип спортивного события.

            * `1` — основной тип
          format: int64
        vid:
          type: integer
          description: |
            Вид спортивного события.

            * `1` — основной вид
          format: int64
        period:
          type: integer
          description: |
            Период спортивного события.

            * `0` — основной период
          format: int64
        periodNames:
          type: object
          additionalProperties:
            type: string
          description: |
            Локализованные имена каждого периода.
          nullable: true
        startDate:
          type: integer
          description: |
            Дата начала матча в формате Unix Epoch.
          format: int64
        link:
          type: string
          description: |
            Ссылка на спортивное событие на сайте букмекера. Для формирования доменной части ссылки используются `gr` и `cnt` из запроса.
          nullable: true
        hasVideo:
          type: boolean
          description: |
            Определяет наличие видео у спортивного события после начала матча
            (в лайве).
        matchInfoObjectLocalizations:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GameDataFeed.Contract.LocalizationMatchInfoObject'
          description: |
            Информация о турнире в контексте чемпионата. Переводы для каждого
            языка запроса.
          nullable: true
        hasInsights:
          type: boolean
          description: |
            Определяет наличие инсайтов в основной игре или ее подыграх. 
            
            > Возвращается только для основной игры.
      additionalProperties: false
